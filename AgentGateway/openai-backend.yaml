apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
  namespace: agentgateway-system
type: Opaque
stringData:
  # Replace with your actual key
  Authorization: Bearer sk-your-api-key-here
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai-backend
  namespace: agentgateway-system
spec:
  ai:
    provider:
      openai:
        model: gpt-4o # Or your preferred model
  policies:
    auth:
      secretRef:
        name: openai-secret