apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: security-helper-block
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
  rules:
  - matches:
    - path:
        type: Exact
        value: /etc/shadow
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        add:
        - name: X-Security-Status
          value: BLOCKED-BY-GATEWAY
    # Pointing to a dummy backend to ensure it doesn't try to hit your real code
    backendRefs:
    - name: non-existent-service
      port: 80