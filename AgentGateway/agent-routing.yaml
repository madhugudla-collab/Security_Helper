apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: security-helper-ai-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
  rules:
  # RULE 1: Send valid remediation requests to OpenAI
  - matches:
    - path:
        type: PathPrefix
        value: /v1/remediate
    backendRefs:
    - name: openai-backend
      group: agentgateway.dev
      kind: AgentgatewayBackend
      port: 443

  # RULE 2: Block unsafe paths by rewriting them to a non-existent path
  - matches:
    - path:
        type: Exact
        value: /etc/shadow
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /INTERNAL_SECURITY_BLOCK_ACTIVE
    backendRefs:
    - name: non-existent-service
      port: 80